name: antigravity_clone
description: "A Flutter clone of Antigravity with AI chat support"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  provider: ^6.1.1
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Networking
  http: ^1.1.0
  dio: ^5.4.0
  
  # Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # UI
  flutter_staggered_animations: ^1.1.1
  shimmer: ^3.0.0
  bubble: ^1.2.1
  
  # Animation
  simple_animations: ^5.0.2
  
  # Utils
  intl: ^0.19.0
  uuid: ^4.2.2
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  freezed: ^2.4.5

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
