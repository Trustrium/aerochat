name: Build Trust Legacy

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.27.4'
  APP_ORG: 'app.trustlegacy'
  PROJECT_NAME: 'trust_legacy'

jobs:

  # ------------------------------------------------------------
  # Static analysis + tests (fast, gates every push/PR).
  # ------------------------------------------------------------
  analyze:
    name: Analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Generate platform folders
        run: flutter create --platforms=android,ios,web --org ${{ env.APP_ORG }} --project-name ${{ env.PROJECT_NAME }} .

      - name: Write .env (placeholders, analyze doesn't need real keys)
        run: |
          cat > .env <<'EOF'
          SUPABASE_URL=https://placeholder.supabase.co
          SUPABASE_ANON_KEY=placeholder
          GEMINI_API_KEY=
          STRIPE_PUBLISHABLE_KEY=
          RAZORPAY_KEY_ID=
          EOF

      - name: flutter pub get
        run: flutter pub get

      - name: flutter analyze
        run: flutter analyze --no-fatal-infos

      - name: flutter test
        run: flutter test || echo "No tests yet — skipping"

  # ------------------------------------------------------------
  # Android: APK (always) + AAB (only when signing secrets exist).
  # ------------------------------------------------------------
  android:
    name: Android (APK + AAB)
    needs: analyze
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Generate platform folders
        run: flutter create --platforms=android,ios,web --org ${{ env.APP_ORG }} --project-name ${{ env.PROJECT_NAME }} .

      # flutter_secure_storage 10.x needs minSdk 23; Flutter's default is 21.
      # Also raise the intent to what modern Google security guidance expects.
      - name: Bump Android minSdk to 23
        run: |
          sed -i -E 's/minSdk\s*=\s*(flutter\.minSdkVersion|[0-9]+)/minSdk = 23/' android/app/build.gradle.kts
          grep -n "minSdk" android/app/build.gradle.kts

      - name: Write .env from secrets
        run: |
          cat > .env <<EOF
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}
          EOF

      - name: flutter pub get
        run: flutter pub get

      # Optional signing — enabled only when ANDROID_KEYSTORE_BASE64 is set.
      # Generate a keystore locally with:
      #   keytool -genkey -v -keystore upload.jks -keyalg RSA -keysize 2048 \
      #     -validity 10000 -alias upload
      # Then base64-encode it: base64 -w 0 upload.jks
      # Add the b64 string as ANDROID_KEYSTORE_BASE64 secret, and the passwords
      # as ANDROID_KEYSTORE_PASSWORD / ANDROID_KEY_PASSWORD / ANDROID_KEY_ALIAS.
      - name: Set up Android signing (if secrets present)
        id: signing
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "No signing secrets — building debug-signed APK only."
            echo "signed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          mkdir -p android/keys
          echo "$KEYSTORE_B64" | base64 -d > android/keys/upload.jks
          cat > android/key.properties <<EOF
          storeFile=keys/upload.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF
          # Wire signing into android/app/build.gradle (Kotlin DSL variant).
          # The generated build.gradle.kts does not read key.properties by
          # default — inject a signing config block if not already present.
          BUILD_GRADLE=android/app/build.gradle.kts
          if [ -f "$BUILD_GRADLE" ] && ! grep -q "key.properties" "$BUILD_GRADLE"; then
            python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path("android/app/build.gradle.kts")
          src = p.read_text()
          prelude = '''
          import java.util.Properties
          import java.io.FileInputStream
          val keystoreProperties = Properties().apply {
              val f = rootProject.file("key.properties")
              if (f.exists()) load(FileInputStream(f))
          }
          '''
          if "keystoreProperties" not in src:
              src = prelude + src
          signing_block = '''
              signingConfigs {
                  create("release") {
                      keyAlias = keystoreProperties.getProperty("keyAlias")
                      keyPassword = keystoreProperties.getProperty("keyPassword")
                      storeFile = keystoreProperties.getProperty("storeFile")?.let { rootProject.file(it) }
                      storePassword = keystoreProperties.getProperty("storePassword")
                  }
              }
          '''
          src = re.sub(r'buildTypes\s*\{', signing_block + '\n    buildTypes {', src, count=1)
          src = re.sub(
              r'getByName\("release"\)\s*\{',
              'getByName("release") {\n            signingConfig = signingConfigs.getByName("release")',
              src, count=1,
          )
          p.write_text(src)
          PY
          fi
          echo "signed=true" >> $GITHUB_OUTPUT

      - name: Build release APK
        run: flutter build apk --release

      - name: Build AAB (Play Store bundle)
        if: steps.signing.outputs.signed == 'true'
        run: flutter build appbundle --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload AAB artifact
        if: steps.signing.outputs.signed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: warn
          retention-days: 30

  # ------------------------------------------------------------
  # iOS: unsigned build — sufficient for archive inspection, TestFlight
  # / App Store submission requires an Apple Developer account and
  # certificates loaded via secrets (see docs at the end).
  # ------------------------------------------------------------
  ios:
    name: iOS (unsigned)
    needs: analyze
    runs-on: macos-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Generate platform folders
        run: flutter create --platforms=android,ios,web --org ${{ env.APP_ORG }} --project-name ${{ env.PROJECT_NAME }} .

      # flutter_stripe requires iOS 13.0+. Bump the Podfile deployment
      # target before pod install so CocoaPods can resolve stripe_ios.
      - name: Bump iOS deployment target for Stripe
        run: |
          sed -i '' "s/^# platform :ios, .*/platform :ios, '13.0'/" ios/Podfile
          sed -i '' "s/^platform :ios, .*/platform :ios, '13.0'/" ios/Podfile
          grep '^platform :ios' ios/Podfile || echo "platform :ios, '13.0'" >> ios/Podfile

      - name: Write .env from secrets
        run: |
          cat > .env <<EOF
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}
          EOF

      - name: flutter pub get
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package Runner.app
        run: |
          cd build/ios/iphoneos
          zip -qr Runner-unsigned.zip Runner.app

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned
          path: build/ios/iphoneos/Runner-unsigned.zip
          if-no-files-found: warn
          retention-days: 30

  # ------------------------------------------------------------
  # Web: builds the PWA bundle.
  # ------------------------------------------------------------
  web:
    name: Web
    needs: analyze
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Generate platform folders
        run: flutter create --platforms=android,ios,web --org ${{ env.APP_ORG }} --project-name ${{ env.PROJECT_NAME }} .

      - name: Write .env from secrets
        run: |
          cat > .env <<EOF
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}
          EOF

      - name: flutter pub get
        run: flutter pub get

      - name: Build web
        run: flutter build web --release --base-href=/

      - name: Zip web bundle
        run: |
          cd build/web
          zip -qr ../trust-legacy-web.zip .

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-bundle
          path: build/trust-legacy-web.zip
          if-no-files-found: warn
          retention-days: 30

  # ------------------------------------------------------------
  # Release: attaches all artifacts to a GitHub Release when a
  # v* tag is pushed (e.g. `git tag v1.0.0 && git push --tags`).
  # ------------------------------------------------------------
  release:
    name: Attach artifacts to GitHub Release
    needs: [android, ios, web]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/android-apk/*.apk
            dist/android-aab/*.aab
            dist/ios-unsigned/*.zip
            dist/web-bundle/*.zip
          fail_on_unmatched_files: false
          generate_release_notes: true
